<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance" />
    <meta name="description" content="Track your personal finances, investments, and goals" />
    <link rel="manifest" href="/personal-finance-app/manifest.json" />
    <link rel="apple-touch-icon" href="/personal-finance-app/favicon.svg" />
    <title>Personal Finance</title>
    <style>
      /* Immediate black background to prevent white flash */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #ffffff;
      }

      /* Loading screen */
      #loading-screen {
        position: fixed;
        inset: 0;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #loading-screen.hidden {
        display: none;
      }

      /* Spinner animation */
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #18181b;
        border-top-color: #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-text {
        margin-top: 16px;
        font-size: 14px;
        color: #71717a;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" crossorigin src="/personal-finance-app/assets/index-CNKWCkmr.js"></script>
    <link rel="stylesheet" crossorigin href="/personal-finance-app/assets/index-aS-IcAD8.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>

    <div id="root"></div>
  </body>
</html>
